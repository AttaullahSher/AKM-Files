<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipt</title><link rel="stylesheet" href="styles.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header-bar no-print">
            <div class="header-left"><a href="index.html"><button>Home</button></a></div>
            <div class="header-right">
                <button id="auth-button" class="auth-button" onclick="handleGoogleSignIn()">Sign In with Google</button>
                <div id="user-info" class="user-info" style="display: none;">
                    <span class="user-email"></span>
                    <button class="sign-out-btn" onclick="handleSignOut()">Sign Out</button>
                </div>
            </div>
        </header>
        <main class="main-content">
            <div class="action-icons no-print">
                <button id="print-btn" class="icon-btn btn-print" title="Save &amp; Print" aria-label="Save and Print">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
                </button>
                <button id="pdf-btn" class="icon-btn btn-pdf" title="Save &amp; Download PDF" aria-label="Save and Download PDF">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM12 19l-4-4h2.5v-3h3v3H16l-4 4z"/></svg>
                </button>
            </div>

            <div id="receipt" class="receipt-doc">
                <div class="header">
                    <div class="logo"><img src="Assets/Logo.jpg" alt="AKM Logo"></div>
                    <div class="company-details">
                        <div class="company-name" style="color: var(--invoice-blue);">AKM MUSIC</div>
                        <div>Ajmal Khan Mohammed Music Centre LLC</div>
                        <div>TRN # 100050547700003</div>
                    </div>
                </div>

                <div class="doc-title">PAYMENT RECEIPT</div>

                <div class="receipt-meta">
                    <div class="field"><label>Receipt #:</label><input type="text" id="receipt-number" readonly></div>
                    <div class="field"><label>Date:</label><input type="date" id="receipt-date"></div>
                </div>

                <div class="receipt-row">
                    <label>Received with thanks from:</label>
                    <input type="text" class="fill" id="receipt-from" data-cell="name">
                </div>

                <div class="receipt-row">
                    <label>The sum of:</label>
                    <span class="receipt-amount-box">AED <input type="number" id="receipt-amount" step="0.01" min="0"></span>
                </div>

                <div class="receipt-words" id="receipt-words"></div>

                <div class="receipt-row">
                    <label>By:</label>
                    <input type="text" class="fill" id="receipt-mode" placeholder="Cash / Cheque / Bank Transfer / Card">
                </div>

                <div class="receipt-row receipt-purpose">
                    <label>Being payment for:</label>
                    <input type="text" class="fill" id="receipt-purpose" placeholder="e.g. against Invoice # 25xxxxx / advance for ...">
                </div>

                <div class="receipt-sign">
                    <div class="signatory authorized">
                        <img src="Assets/Sign.jpeg" alt="Authorized Signature">
                        Authorized Signatory
                    </div>
                </div>

                <div class="footer">+971 (02) 621 9929 | sales@akm-music.com | PO Box 8227, E3-02, Abu Dhabi, UAE</div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initGoogleAuth();

            // Auto-fill receipt number and today's date
            document.getElementById('receipt-number').value = generateNumber('receipt');
            document.getElementById('receipt-date').value = new Date().toISOString().split('T')[0];

            // Live "amount in words"
            const amountInput = document.getElementById('receipt-amount');
            const wordsEl = document.getElementById('receipt-words');
            const updateWords = () => {
                const value = parseFloat(amountInput.value);
                wordsEl.textContent = value > 0 ? numberToWords(value) : '';
            };
            amountInput.addEventListener('input', updateWords);

            // Save & Print
            document.getElementById('print-btn').addEventListener('click', function() {
                window.print();
            });

            // Save & Download PDF (one A4 page, no print dialog)
            document.getElementById('pdf-btn').addEventListener('click', downloadReceiptPdf);
        });

        function downloadReceiptPdf() {
            const button = document.getElementById('pdf-btn');
            const receipt = document.getElementById('receipt');
            const number = document.getElementById('receipt-number').value || 'receipt';

            button.disabled = true;

            const options = {
                margin: 10,
                filename: 'Receipt-' + number + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(options).from(receipt).save()
                .then(() => { button.disabled = false; })
                .catch((err) => {
                    console.error('PDF generation failed:', err);
                    alert('Could not generate PDF. Please try again or use Print.');
                    button.disabled = false;
                });
        }
    </script>
</body>
</html>
